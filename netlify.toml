# =====================================================
# Configuracion de Netlify para ML-EduRisk
# =====================================================

# Configuracion de build y publicacion
[build]
  # Directorio de publicacion (raiz del proyecto)
  publish = "."
  
  # Comando de build (no requerido para sitios estaticos simples)
  # Dejar vacio o comentar si no hay proceso de compilacion
  # command = ""

# =====================================================
# Headers de Seguridad y Cache
# =====================================================

# Headers globales para todas las paginas
[[headers]]
  for = "/*"
  [headers.values]
    # Seguridad
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy (CSP) - Ajustar segun necesidades
    # Permite recursos de CDNs utilizados en el proyecto
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'"

# Cache para archivos CSS (1 ano - inmutable)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para archivos JavaScript (1 ano - inmutable)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para imagenes (1 ano - inmutable)
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para fuentes web (1 ano - inmutable)
[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache para el archivo HTML principal (siempre actualizado)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# =====================================================
# Redirects (Opcional)
# =====================================================

# Redireccion para SPA (Single Page Application)
# Descomentar si se implementa routing basado en URL
